<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>ADD EMPLOYEES</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome CDN (KEEP THIS) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body id="addProductBody" style="margin: 0; padding: 0;">
    <section class="Add-product-section" style="min-height: 100vh;">
        
        <div>
            <h1 class="add-p-header">
                <i class="fa-solid fa-user-plus"></i> ADD EMPLOYEE 
            </h1>
        </div>
        
        <article id="Add-container">

            <div>
                <label class="label">
                    <i class="fa-solid fa-user"></i> First Name:
                </label>
                <section style="display: flex; flex-direction: column; width: 80%; min-height: 80%; max-height: 500px;">
                    <input style="height: 35px; width:100%;" type="text" id="empl-fname" class="add-p-input" placeholder="input your first-name here" required>
                    <p class="firstN-error"></p>
                </section>
            </div>
            
            <div>
                <label class="label">
                    <i class="fa-solid fa-user-tag"></i> Last Name:
                </label>
                <section style="display: flex; flex-direction: column; width: 80%; min-height: 80%; max-height: 500px;">
                    <input style="height: 35px; width:100%;" type="text" id="empl-lname" class="add-p-input" placeholder="input the last-name here" required>
                    <p class="lastN-error"></p>
                </section>
            </div>
            
            <div>
                <label class="label">
                    <i class="fa-solid fa-lock"></i> Password:
                </label>
                <section style="display: flex; flex-direction: column; width: 80%; min-height: 80%; max-height: 500px;">
                    <input style="height: 35px; width:100%;" type="password" id="empl-pass" class="add-p-input" placeholder="input your password here" required>
                    <p class="password-error"></p>
                </section>
            </div>
            
            <div style="display:flex; justify-content: center; align-items: center;">
                <button class="add-p-btn" id="save">
                    <i class="fa-solid fa-user-check"></i> SAVE EMPLOYEE
                </button>  
            </div>             

        </article>
    </section>
             
              <!-- ADDED PRODUCT SUCCESSFULLY ALERT -->
             <section class="alert-add-succ">
            <div class="mess">
                <h1>✅</h1>
                <h3>Product Added successfully</h3>
              <div>
                  <p class="successful-pInfo"></p>
              </div>
            </div>
            <div class="Ok-div">
                <button class="ok">OK</button>
            </div>
        </section>
             
             
             <section class="load-background">
            <article class="load"></article>
        </section>
  
  <script src="Authentication.js"></script>
</body>        
</html>
