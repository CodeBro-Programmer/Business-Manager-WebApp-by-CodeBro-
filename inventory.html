<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <title>Pharmacy Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="inven-body">
    <section class="Inventory-cont">
        <h1>J.C Pharmaceuticals Inventory</h1>
    </section>
    
    
         <section class="labels">
            <div>
                <label>Name</label>
            </div>
            <div>
                <label>Price</label>
            </div>
            <div>
                <label>Quantity</label>
            </div>
        </section>
        
        

    <section class="section-body">
        <article class="container">
            <div>
                <p id="name">Aspirin</p>
            </div>
            <div>
                <p id="price">2000 naira</p>
            </div>
            <div>
                <p id="quantity">200</p>
            </div>
            <div class="btn-div">
                <button class="btn-delete">Delete</button>
            </div>
            <div class="btn-div">
                <button class="btn-edit">Edit</button>
            </div>
        </article>
    </section>
    
    <section class="delete-confirmation">
        
        <span>
        <article class="Confirmation-cont">
            <p class="confirmation-mess">Are you sure you want to delete it?</p>
        </article>
        <article class="yes-no">
            <div class="cancel-cont">
                <button  class="cancel-btn">Cancel</button>
            </div>
            <div class="yes-cont">
                <button class="yes-btn">Yes</button>
            </div>
        </article>
        </span>
        
    </section>
    
    
    <script src="inven.js">
         

    </script>
</body>
</html>
