<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
        <h1 class="page-title">SMART Business Manager</h1>
    <section>
        <div>
            <h2>Login</h2>
        </div>
        
        <div class="info">
            <label>ID:</label>
            <input class="user-id" type="number" placeholder="input you ID here">
            <p class="errorId" style="margin-top: -8px; font-size: 0.7rem; color:red;"></p>
        </div>
        
        <div class="info">
            <label>First Name:</label>
            <input class="user-name" type="text" placeholder="input you first-name here">
             <p class="errorFirstN" style="margin-top: -8px; font-size: 0.7rem; color:red;"></p>
        </div>
        
        <div class="info">
            <label>Password:</label>
            <input class="user-pass" type="text" placeholder="input you password here">
             <p class="errorPass" style="margin-top: -8px; font-size: 0.7rem; color:red;"></p>
        </div>
        
        <div class="login-div">
            <button class="login">Login Now</button>
        </div>
        
        <div class="signUp">
            <p>Don't have an account? <a href="signUp.html">Sign-Up</a></p>
        </div>
    </section>
    
    
    <section class="create-account-body">
         <h1 class="page-title">SMART Business Manager</h1>
        <article class="c-acc-cont">
            <div class="c-acc-head">
                <p>You don't have any account now 🤔<br>Click the button below to create your business account 💯😃</p>    
            </div>       
            <div class="c-acc-button-cont">
                <button class="createAcc">Create Account</button>
            </div> 
        </article>
    </section>
    
    <script src="login.js"></script>
</body>
</html>
